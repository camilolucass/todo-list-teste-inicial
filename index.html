<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lista de Tarefas</title>
    <meta
      name="description"
      content="Aplicacao web simples de lista de tarefas com cadastro, busca, edicao e exclusao."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-bar" aria-labelledby="page-title">
        <div>
          <p class="eyebrow">Teste Inicial | Programacao</p>
          <h1 id="page-title">Lista de Tarefas</h1>
        </div>
        <div class="summary" aria-label="Resumo das tarefas">
          <span><strong id="total-count">0</strong> total</span>
          <span><strong id="pending-count">0</strong> pendentes</span>
          <span><strong id="done-count">0</strong> concluidas</span>
        </div>
      </section>

      <div class="workspace">
        <section class="task-editor" aria-labelledby="form-title">
          <div class="section-heading">
            <h2 id="form-title">Nova tarefa</h2>
            <button class="ghost-button hidden" id="cancel-edit" type="button">
              Cancelar edicao
            </button>
          </div>

          <form id="task-form" novalidate>
            <input type="hidden" id="task-id" />

            <label for="task-title">Titulo</label>
            <input
              id="task-title"
              name="title"
              type="text"
              maxlength="80"
              autocomplete="off"
              required
              placeholder="Ex.: Enviar relatorio"
            />
            <p class="field-error" id="title-error" aria-live="polite"></p>

            <label for="task-description">Descricao</label>
            <textarea
              id="task-description"
              name="description"
              rows="5"
              placeholder="Detalhes da tarefa"
            ></textarea>

            <div class="field-grid">
              <div>
                <label for="task-date">Data prevista</label>
                <input id="task-date" name="dueDate" type="date" required />
                <p class="field-error" id="date-error" aria-live="polite"></p>
              </div>

              <div>
                <label for="task-status">Status</label>
                <select id="task-status" name="status">
                  <option value="Pendente">Pendente</option>
                  <option value="Concluida">Concluida</option>
                </select>
              </div>
            </div>

            <button class="primary-button" id="submit-button" type="submit">
              Adicionar tarefa
            </button>
          </form>
        </section>

        <section class="task-list-panel" aria-labelledby="list-title">
          <div class="section-heading list-heading">
            <div>
              <h2 id="list-title">Tarefas</h2>
              <p id="result-count">0 resultados</p>
            </div>

            <label class="search-box" for="task-search">
              <span aria-hidden="true">/</span>
              <input
                id="task-search"
                type="search"
                placeholder="Pesquisar"
                autocomplete="off"
              />
            </label>
          </div>

          <div class="empty-state" id="empty-state">
            <strong id="empty-message">Nenhuma tarefa cadastrada</strong>
          </div>

          <ul class="task-list" id="task-list" aria-live="polite"></ul>
        </section>
      </div>
    </main>

    <template id="task-template">
      <li class="task-card">
        <div class="task-card-main">
          <div class="task-title-row">
            <span class="status-dot" aria-hidden="true"></span>
            <h3></h3>
          </div>
          <p class="task-description"></p>
          <div class="task-meta">
            <span class="due-date"></span>
            <span class="status-badge"></span>
          </div>
        </div>

        <div class="task-actions" aria-label="Acoes da tarefa">
          <button class="icon-button edit-button" type="button" title="Editar">
            Editar
          </button>
          <button class="icon-button delete-button" type="button" title="Excluir">
            Excluir
          </button>
        </div>
      </li>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
